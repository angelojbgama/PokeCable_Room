name: tests

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python
        run: python -m compileall PokeCable/api PokeCable/backend

      - name: Run API tests
        run: PYTHONPATH=PokeCable/api python -m unittest discover -s PokeCable/api/tests -v

      - name: Run backend tests
        run: PYTHONPATH=PokeCable/backend python -m unittest discover -s PokeCable/backend/tests -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JavaScript syntax
        run: node --check PokeCable/frontend/app.js
